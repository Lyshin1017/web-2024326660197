<div class="message-section">
    <h3 class="work-title">粉丝留言</h3>
    <div class="message-container">
        <!-- 左侧 留言表单 -->
        <div class="message-form">
            <div class="form-header">
                <span class="form-icon">💌</span>
                <span class="form-title">留下你的心动留言</span>
            </div>
            <input type="text" placeholder="你的昵称 / 粉丝名" class="form-input" id="nickname">
            <input type="email" placeholder="你的邮箱（选填）" class="form-input" id="email">
            <input type="text" placeholder="你的联系方式（选填）" class="form-input" id="contact">
            <select class="form-input" id="target">
                <option value="" disabled selected>选择留言对象</option>
                <option value="组合">TOP登陆少年组合</option>
                <option value="朱志鑫">朱志鑫</option>
                <option value="张泽禹">张泽禹</option>
                <option value="张极">张极</option>
                <option value="左航">左航</option>
                <option value="苏新皓">苏新皓</option>
            </select>
            <textarea placeholder="写下你想对少年们说的话..." class="form-textarea" id="content"></textarea>
            <button class="submit-btn">发送留言 ✨</button>
        </div>

        <!-- 右侧 图片 -->
        <div class="message-image">
            <img src="images/48.jpg" alt="TOP登陆少年组合">
        </div>
    </div>
</div>
