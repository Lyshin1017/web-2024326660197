<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - TOP登陆少年组合</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <!-- 导航栏 -->
        <nav>
             <div class="nav-logo">
                 <img src="images/团logo.jpg" alt="TOP登陆少年Logo" class="logo-img">
             </div>
             <ul>
                 <li><a href="index.html">首页</a></li>
                 <li><a href="role.html">成员介绍</a></li>
                 <li><a href="img.html">相册图片</a></li>
                 <li><a href="item.html">作品</a></li>
                 <li><a href="contact.html">粉丝留言</a></li>
                 <li><a href="login.html">登录 | 注册</a></li>
             </ul>
        </nav>
        <!-- 页面头部 -->
        <div class="page-header">
            <div class="header-inner">
                 <h1>TOP登陆少年组合</h1>
                 <p>TOP陪你们纠缠到世界毁灭 💜 The Way To The TOP</p>
            </div>
        </div>

        <!-- 顶部横幅 -->
        <div class="banner">
            <img src="images/banner.jpg" alt="">
        </div>
       
        <!-- 标题栏 -->
        <div class="title">
             <hr>
             <span>用户登录</span>
             <hr>
        </div>

        <!-- 登录表单主体 -->
        <div class="auth-container">
            <div class="auth-header">
                <h2>账号登录</h2>
                <p>登录账号，开启互动之旅</p>
            </div>

            <form>
                <div class="form-group">
                    <label>用户名 / 邮箱</label>
                    <input type="text" class="form-input" placeholder="请输入用户名或邮箱" required>
                </div>
                <div class="form-group">
                    <label>登录密码</label>
                    <input type="password" class="form-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="submit-btn">登录</button>
            </form>

            <div class="form-footer">
                还没有账号？<a href="register.html">立即注册</a>
            </div>
        </div>

        <!-- 页脚 -->
        <footer>TOP登陆少年组合</footer>
    </main>
</body>
</html>
